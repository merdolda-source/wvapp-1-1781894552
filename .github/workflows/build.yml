name: Build APK and AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v3
      - name: Create Keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/release.jks -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=AppForge, OU=Mobile, O=AppForge, L=Istanbul, ST=Istanbul, C=TR"
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env: { KEYSTORE_PASSWORD: android, KEY_ALIAS: release, KEY_PASSWORD: android }
      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon
        env: { KEYSTORE_PASSWORD: android, KEY_ALIAS: release, KEY_PASSWORD: android }
      - uses: actions/upload-artifact@v4
        with: { name: release-apk, path: app/build/outputs/apk/release/*.apk, retention-days: 30 }
      - uses: actions/upload-artifact@v4
        with: { name: release-aab, path: app/build/outputs/bundle/release/*.aab, retention-days: 30 }